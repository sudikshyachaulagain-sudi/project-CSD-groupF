<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Gallery - Explore Nepal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
}

header {
    background: #000000; /* Black header */
    color: white;
    text-align: center;
    padding: 15px;
}

h2 {
    text-align: center;
    margin-top: 30px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    border-radius: 10px;
    transition: transform 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
}

footer {
    text-align: center;
    padding: 10px;
    background: #333;
    color: white;
}
</style>
</head>

  </div>
</nav>
