<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - Explore Nepal</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
}

header {
    background: #8B0000;
    color: white;
    text-align: center;
    padding: 15px;
}

h2 {
    text-align: center;
    margin-top: 30px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    border-radius: 10px;
    transition: transform 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
}

footer {
    text-align: center;
    padding: 10px;
    background: #333;
    color: white;
}
</style>
</head>

<body>

<header>
    <h1>Explore Nepal - Gallery</h1>
</header>

<h2>Traditional Dresses</h2>
<div class="gallery">
    <img src="images/dress1.jpg" alt="Dress">
    <img src="images/dress2.jpg" alt="Dress">
</div>

<h2>Festivals</h2>
<div class="gallery">
    <img src="images/festival1.jpg" alt="Dashain">
    <img src="images/festival2.jpg" alt="Tihar">
    <img src="images/festival3.jpg" alt="Holi">
</div>

<h2>Temples</h2>
<div class="gallery">
    <img src="images/temple1.jpg" alt="Temple">
    <img src="images/temple2.jpg" alt="Temple">
</div>

<footer>
    <p>© 2026 Explore Nepal</p>
</footer>

</body>
</html>
