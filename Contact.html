<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Explore Nepal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
}

header {
    background: #000000; /* Black header as requested */
    color: white;
    text-align: center;
    padding: 15px;
}

.container-form {
    width: 90%;
    max-width: 500px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button.btn-submit {
    width: 100%;
    padding: 10px;
    background: #000000;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button.btn-submit:hover {
    background: #333333;
}

#message {
    text-align: center;
    color: green;
    margin-top: 10px;
}

footer {
    text-align: center;
    padding: 10px;
    background: #333;
    color: white;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">Explore Nepal</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="culture.html">Culture & Tradition</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html#festivals">Festivals</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html#food">Food</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html#gallery">Gallery</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html#contact">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<header>
    <h1>Contact Us</h1>
</header>

<div class="container-form">
    <form id="contactForm">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="email" id="email" placeholder="Your Email" required>
        <textarea id="msg" rows="5" placeholder="Your Message" required></textarea>
        <button type="submit" class="btn-submit">Send Message</button>
    </form>
    <p id="message"></p>
</div>

<footer>
    <p>© 2026 Explore Nepal</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault();
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let msg = document.getElementById("msg").value;
    if(name === "" || email === "" || msg === "") {
        alert("Please fill all fields!");
        return;
    }
    document.getElementById("message").innerText = "Message sent successfully!";
    document.getElementById("contactForm").reset();
});
</script>

</body>
</html>
